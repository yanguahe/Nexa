services:
  - type: web
    name: nexa
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: NEXA_STATE_DIR
        value: /data/.nexa
      - key: NEXA_WORKSPACE_DIR
        value: /data/workspace
      - key: NEXA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: nexa-data
      mountPath: /data
      sizeGB: 1
