services:
  nexa-gateway:
    image: ${NEXA_IMAGE:-nexa:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NEXA_GATEWAY_TOKEN: ${NEXA_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${NEXA_CONFIG_DIR}:/home/node/.nexa
      - ${NEXA_WORKSPACE_DIR}:/home/node/.nexa/workspace
    ports:
      - "${NEXA_GATEWAY_PORT:-18789}:18789"
      - "${NEXA_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${NEXA_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  nexa-cli:
    image: ${NEXA_IMAGE:-nexa:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NEXA_GATEWAY_TOKEN: ${NEXA_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${NEXA_CONFIG_DIR}:/home/node/.nexa
      - ${NEXA_WORKSPACE_DIR}:/home/node/.nexa/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
